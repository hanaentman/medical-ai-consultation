<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>의료 서비스 AI 상담</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="sidebar" aria-label="상담 정보">
        <div class="brand-block">
          <span class="brand-mark" aria-hidden="true">M</span>
          <div>
            <p class="eyebrow">Medical Service AI</p>
            <h1>의료 서비스 상담</h1>
          </div>
        </div>
        <p class="lead">병원 문서를 바탕으로 진료 안내, 예약, 증상 분류, 비용과 서류 발급 문의를 도와드립니다.</p>

        <div class="notice">
          <strong>안전 안내</strong>
          <p>이 상담은 진단이나 처방을 대신하지 않습니다. 응급 증상은 119 또는 응급실로 바로 연결해 주세요.</p>
        </div>

        <div class="quick-actions" aria-label="빠른 질문">
          <button type="button" data-question="진료시간과 접수 마감 시간을 알려주세요.">진료시간</button>
          <button type="button" data-question="코막힘과 콧물이 있는데 어느 센터로 가야 하나요?">코 증상</button>
          <button type="button" data-question="수면검사는 입원이 필요한가요?">수면검사</button>
          <button type="button" data-question="진단서나 의무기록 사본 발급 방법을 알려주세요.">서류발급</button>
        </div>
      </section>

      <section class="chat-panel" aria-label="AI 상담 채팅">
        <header class="topbar">
          <div>
            <strong>상담 채팅</strong>
            <span id="status">문서와 API 상태를 확인하는 중입니다.</span>
          </div>
        </header>
        <div id="messages" class="messages" aria-live="polite"></div>

        <form id="chat-form" class="composer">
          <label class="sr-only" for="message-input">질문 입력</label>
          <textarea id="message-input" rows="2" placeholder="예: 목이 붓고 통증이 있는데 어떤 진료를 받아야 하나요?"></textarea>
          <button type="submit">전송</button>
        </form>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
